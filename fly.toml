app = "youorganic"
primary_region = "scl"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  APP_URL = "https://youorganic.fly.dev"
  FRONTEND_URL = "https://youorganic.fly.dev"
  LOG_CHANNEL = "stderr"
  DB_CONNECTION = "pgsql"
  SESSION_DRIVER = "cookie"
  CACHE_STORE = "array"
  QUEUE_CONNECTION = "sync"
